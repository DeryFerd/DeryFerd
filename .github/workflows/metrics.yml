name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: DeryFerd
          filename: github/metrics.svg

          # Base config
          base: header, activity, community, repositories, metadata

          # === COMPASS PLUGINS ===

          # Commit activity calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # PR & code review stats
          plugin_followup: yes
          plugin_followup_sections: repositories

          # Languages breakdown
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size, percentage

          # Most starred & recent activity
          plugin_stars: yes
          plugin_stars_limit: 3

          # Habits (coding time, commit frequency)
          plugin_habits: yes
          plugin_habits_from: 5
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Achievements badges
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0

          # Introduction (pulls bio from GitHub profile)
          plugin_introduction: yes
          plugin_introduction_title: yes

          # Output
          config_output: svg
          config_display: regular
